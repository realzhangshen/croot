name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ARCHIVE="croot-${TAG}-${TARGET}.tar.gz"
          tar czf "$ARCHIVE" -C "target/${TARGET}/release" croot
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: croot-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: croot-*.tar.gz

  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets and compute SHA256
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          BASE="https://github.com/realzhangshen/croot/releases/download/${TAG}"
          ARM_URL="${BASE}/croot-${TAG}-aarch64-apple-darwin.tar.gz"
          X86_URL="${BASE}/croot-${TAG}-x86_64-apple-darwin.tar.gz"

          curl -fSL -o arm64.tar.gz "$ARM_URL"
          curl -fSL -o x86_64.tar.gz "$X86_URL"

          ARM_SHA=$(sha256sum arm64.tar.gz | cut -d ' ' -f1)
          X86_SHA=$(sha256sum x86_64.tar.gz | cut -d ' ' -f1)

          echo "ARM_URL=$ARM_URL" >> "$GITHUB_ENV"
          echo "X86_URL=$X86_URL" >> "$GITHUB_ENV"
          echo "ARM_SHA=$ARM_SHA" >> "$GITHUB_ENV"
          echo "X86_SHA=$X86_SHA" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Update Homebrew tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cat > formula.rb <<EOF
          class Croot < Formula
            desc "Lightweight terminal file tree sidebar with vim-style navigation"
            homepage "https://github.com/realzhangshen/croot"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${ARM_URL}"
                sha256 "${ARM_SHA}"
              else
                url "${X86_URL}"
                sha256 "${X86_SHA}"
              end
            end

            def install
              bin.install "croot"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/croot --version")
            end
          end
          EOF

          CONTENT=$(base64 -w 0 < formula.rb)

          # Check if file exists (get its SHA for update)
          EXISTING_SHA=$(gh api "repos/realzhangshen/homebrew-croot/contents/Formula/croot.rb" \
            --jq '.sha' 2>/dev/null || true)

          API_BODY=$(jq -n \
            --arg message "croot ${VERSION}" \
            --arg content "$CONTENT" \
            --arg sha "$EXISTING_SHA" \
            'if $sha == "" then {message: $message, content: $content}
             else {message: $message, content: $content, sha: $sha} end')

          gh api "repos/realzhangshen/homebrew-croot/contents/Formula/croot.rb" \
            --method PUT \
            --input - <<< "$API_BODY"
